<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img" aria-labelledby="seq00-title seq00-desc">
  <title id="seq00-title">00 선수지식 증거 지도</title>
  <desc id="seq00-desc">시스템 밖의 HTTP 도구에서 요청과 응답을 확인하고, Git 작업 기록과 상태·데이터 레이어의 row 식별 기준을 구분하는 지도</desc>
  <metadata>Source: A&amp;I Backend Visual Lab; License: project-local educational asset; redistribution follows repository terms.</metadata>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#2955E4"/></marker>
    <style>
      text{font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;fill:#111B3F}
      .frame{fill:#FFFFFF;stroke:#6F82B8;stroke-width:2}
      .node{stroke-width:2.5}
      .layer-outside{fill:#F1F5F9;stroke:#5B677A}
      .layer-interface{fill:#E6F4F7;stroke:#0E7490}
      .layer-application{fill:#F2EDFF;stroke:#6D43A8}
      .layer-resource{fill:#EAF5EE;stroke:#2C7352}
      .layer-integration{fill:#FFF4D6;stroke:#926000}
      .layer-runtime{fill:#EEF2F7;stroke:#52627A}
      [data-layer="outside"] .layer{fill:#5B677A}
      [data-layer="resource"] .layer{fill:#2C7352}
      .flow{fill:none;stroke:#2955E4;stroke-width:3;marker-end:url(#arrow)}
      .divider{stroke:#C9D6F3;stroke-width:2}
      .group{font-size:27px;font-weight:850;fill:#0C2691}
      .layer{font-size:25px;font-weight:800;fill:#4B587C}
      .name{font-size:28px;font-weight:800;text-anchor:middle}
      .body{font-size:25px;font-weight:650;fill:#4B587C;text-anchor:middle}
    </style>
  </defs>
  <rect width="720" height="340" fill="#F8F9FB"/>
  <rect x="20" y="20" width="680" height="300" rx="18" class="frame"/>

  <text x="42" y="57" class="group">HTTP 증거 · 시스템 밖</text>
  <g data-layer="outside">
    <rect x="36" y="76" width="190" height="88" rx="10" class="node layer-outside"/>
    <text x="131" y="116" class="name">요청 구성</text>
    <text x="131" y="151" class="body">method · URL</text>
  </g>
  <path d="M226 120h34" class="flow"/>
  <g data-layer="outside">
    <rect x="265" y="76" width="190" height="88" rx="10" class="node layer-outside"/>
    <text x="360" y="130" class="name">HTTP Client</text>
  </g>
  <path d="M455 120h34" class="flow"/>
  <g data-layer="outside">
    <rect x="494" y="76" width="190" height="88" rx="10" class="node layer-outside"/>
    <text x="589" y="116" class="name">응답 판단</text>
    <text x="589" y="151" class="body">status + body</text>
  </g>

  <line x1="42" y1="185" x2="670" y2="185" class="divider"/>
  <text x="42" y="216" class="group">작업 기록과 데이터 식별</text>
  <g data-layer="outside">
    <rect x="42" y="232" width="280" height="68" rx="9" class="node layer-outside"/>
    <text x="182" y="257" class="layer" text-anchor="middle">시스템 밖</text>
    <text x="182" y="288" class="name">branch → commit</text>
  </g>
  <g data-layer="resource">
    <rect x="390" y="232" width="280" height="68" rx="9" class="node layer-resource"/>
    <text x="530" y="257" class="layer" text-anchor="middle">상태·데이터</text>
    <text x="530" y="288" class="name">row → PK</text>
  </g>
</svg>
